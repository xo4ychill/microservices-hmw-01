# =============================================================================
# Полный стек: API Gateway перед тремя микросервисами.
#
# Топология:
#
#   клиент --> gateway (nginx, порт 80) --> security  (регистрация/токены)
#                                       --> uploader   (приём и сжатие файлов)
#                                       --> minio      (хранение файлов, S3)
#
# Все сервисы сидят в одной bridge-сети "backend" и обращаются друг к другу
# по DNS-именам сервисов (security, uploader, minio) — Docker Compose поднимает
# встроенный DNS для этого автоматически.
# =============================================================================

services:
  # ---------------------------------------------------------------------
  # API Gateway. Единственный сервис, у которого порт торчит наружу (80).
  # Конфиг маршрутизации и auth_request монтируется как read-only volume,
  # поэтому его можно менять и перечитывать без пересборки образа —
  # достаточно `docker compose restart gateway`.
  # ---------------------------------------------------------------------
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      # depends_on гарантирует только порядок СТАРТА контейнеров,
      # а не готовность приложения внутри них (нет health-check ожидания).
      - security
      - uploader
      - minio
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Сервис аутентификации: регистрация пользователей, выдача и проверка
  # JWT-токенов. Хранилище пользователей — in-memory (см. security/app.py),
  # поэтому при перезапуске контейнера все зарегистрированные пользователи
  # теряются — для прода нужна отдельная БД.
  # ---------------------------------------------------------------------
  security:
    build: ./security
    environment:
      - PORT=8000
      # Секрет для подписи JWT (HMAC-SHA256). В реальном проекте — брать
      # из secret-хранилища (Vault/Secrets Manager), а не хардкодить.
      - JWT_SECRET=insecure-dev-secret-change-me
      # Время жизни токена в секундах (1 час).
      - TOKEN_TTL_SECONDS=3600
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Сервис загрузки: принимает бинарные данные, пытается распознать их как
  # изображение и пережать в JPEG (экономия места), после чего кладёт
  # результат в MinIO под сгенерированным UUID-именем.
  # Токен здесь повторно НЕ проверяется — доверяем шлюзу как единой точке
  # входа (auth_request уже отсеял неавторизованные запросы).
  # ---------------------------------------------------------------------
  uploader:
    build: ./uploader
    environment:
      - PORT=8000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=images
    depends_on:
      - minio
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Хранилище файлов, S3-совместимое. Официальный образ.
  # Данные складываются в именованный volume minio-data,
  # чтобы переживать перезапуск контейнера.
  # ---------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Одноразовый init-контейнер (запускается, выполняет команду и завершается).
  # Задача: дождаться готовности MinIO, создать бакет "images" (если его ещё
  # нет) и разрешить анонимное чтение объектов из него.
  #
  # Зачем нужна публичность бакета: шлюз проксирует GET /images/{file}
  # напрямую в MinIO простым HTTP-запросом (proxy_pass), не подписывая его
  # по алгоритму AWS SigV4. Если бы бакет был приватным, MinIO ответил бы
  # 403 на такой неподписанный запрос. Проверка прав уже
  # выполнена на уровне шлюза (auth_request).
  # ---------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/images || true;
      mc anonymous set public local/images;
      "
    networks:
      - backend

networks:
  # Изолированная сеть только для сервисов этого стенда.
  backend:
    driver: bridge

volumes:
  # Именованный volume для персистентности данных MinIO между перезапусками.
  minio-data:
