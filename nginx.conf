worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 20m;

    upstream security {
        server security:8000;
    }

    upstream uploader {
        server uploader:8000;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 80;
        server_name localhost;

        # -----------------------------------------------------------------
        # Внутренняя локация для проверки токена через auth_request.
        # Пробрасывает заголовок Authorization в security-сервис и не
        # пересылает тело запроса (проверка не требует тела).
        # -----------------------------------------------------------------
        location = /_auth {
            internal;
            proxy_pass http://security/v1/token/validation/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # ---- Анонимные маршруты ----

        location = /register {
            proxy_pass http://security/v1/user;
        }

        location = /token {
            proxy_pass http://security/v1/token;
        }

        # ---- Маршруты, требующие валидный токен ----

        location = /user {
            auth_request /_auth;
            proxy_pass http://security/v1/user;
        }

        location = /upload {
            auth_request /_auth;
            proxy_pass http://uploader/v1/upload;
        }

        # GET /images/{file} -> minio GET /images/{file} (S3 bucket "images")
        location ~ ^/images/(?<image_name>.+)$ {
            auth_request /_auth;
            proxy_pass http://minio/images/$image_name;
        }

        # Единая обработка ошибки авторизации
        error_page 401 403 = @unauthorized;
        location @unauthorized {
            return 401 '{"error": "unauthorized"}';
        }
    }
}
