# =============================================================================
# NGINX как API Gateway для трёх бэкенд-сервисов: security, uploader, minio.
#
# Общая идея:
#   1. Клиент всегда обращается только на 80-й порт шлюза — про существование
#      трёх разных сервисов "за спиной" он не знает.
#   2. Для "открытых" маршрутов (/register, /token) NGINX просто проксирует
#      запрос дальше без проверок — это вход в систему для ещё неавторизо-
#      ванного пользователя.
#   3. Для "защищённых" маршрутов (/user, /upload, /images/*) перед проксиро-
#      ванием NGINX сначала делает служебный подзапрос (auth_request) к
#      сервису security, чтобы убедиться, что токен в заголовке Authorization
#      валиден. Если подзапрос вернул не 2xx — основной запрос до бэкенда
#      вообще не доходит, клиент сразу получает 401.
# =============================================================================

worker_processes auto;

events {
    # Сколько одновременных соединений может держать один worker-процесс.
    # Для учебного стенда значения по умолчанию.
    worker_connections 1024;
}

http {
    # Загрузка файла может быть довольно объёмной (фото с телефона),
    # поэтому увеличиваем лимит тела запроса с дефолтного 1m.
    client_max_body_size 20m;

    # -------------------------------------------------------------------
    # upstream-блоки — это просто именованные группы бэкендов.
    # Здесь по одному серверу на каждый, но при желании легко добавить
    # несколько реплик каждого сервиса для балансировки нагрузки:
    #   upstream security { server security_1:8000; server security_2:8000; }
    # -------------------------------------------------------------------
    upstream security {
        server security:8000;
    }

    upstream uploader {
        server uploader:8000;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 80;
        server_name localhost;

        # =================================================================
        # Служебная (internal) локация — точка входа для auth_request.
        #
        # auth_request не является полноценным HTTP-запросом от клиента:
        # это "суб-запрос", который NGINX выполняет сам, ВНУТРИ обработки
        # основного запроса, и смотрит только на код ответа (2xx/4xx/5xx),
        # тело ответа отбрасывается (если явно не читать его через
        # auth_request_set).
        #
        # - proxy_pass_request_body off  — тело исходного запроса (например,
        #   бинарник картинки при /upload) в security НЕ пересылаем: сервису
        #   security нужен только заголовок Authorization, а не файл.
        # - proxy_set_header Content-Length "" — обязательная пара к
        #   предыдущей строке: раз тела нет, обнуляем Content-Length,
        #   иначе upstream будет ждать байты, которых не придёт.
        # - proxy_set_header Authorization $http_authorization — явно
        #   прокидываем заголовок Authorization из исходного клиентского
        #   запроса в суб-запрос (по умолчанию NGINX его не факт что передаст
        #   один в один, поэтому указываем явно).
        # =================================================================
        location = /_auth {
            internal;  # запретить прямой доступ извне, только через auth_request
            proxy_pass http://security/v1/token/validation/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # =================================================================
        # Анонимные маршруты — без auth_request.
        # Это единственные точки входа для ещё не аутентифицированного
        # клиента: регистрация нового пользователя и получение токена.
        # =================================================================

        # POST /register -> security: POST /v1/user
        location = /register {
            proxy_pass http://security/v1/user;
        }

        # POST /token -> security: POST /v1/token
        location = /token {
            proxy_pass http://security/v1/token;
        }

        # =================================================================
        # Защищённые маршруты — сначала auth_request, потом проксирование.
        #
        # Директива `auth_request /_auth;` заставляет NGINX перед обработкой
        # location'а сходить в /_auth (см. выше). Если тот ответил 2xx —
        # выполнение продолжается на proxy_pass ниже. Если 401/403 — NGINX
        # сам возвращает клиенту тот же код, минуя backend.
        # =================================================================

        # GET /user -> security: GET /v1/user
        # (сервис сам определит текущего пользователя по токену в заголовке,
        #  который проксируется вместе с остальными заголовками запроса)
        location = /user {
            auth_request /_auth;
            proxy_pass http://security/v1/user;
        }

        # POST /upload -> uploader: POST /v1/upload
        # Тело запроса (бинарные данные картинки) в этот location передаётся
        # клиентом целиком и пробрасывается в uploader как есть — в отличие
        # от суб-запроса /_auth, здесь proxy_pass_request_body НЕ отключаем.
        location = /upload {
            auth_request /_auth;
            proxy_pass http://uploader/v1/upload;
        }

        # GET /images/{file} -> minio: GET /images/{file}
        # Именованная группа (?<image_name>.+) в регулярке вытаскивает имя
        # файла из URL и подставляет его в путь к MinIO через $image_name.
        # "images" в пути до MinIO — это имя S3-бакета, а не часть API.
        location ~ ^/images/(?<image_name>.+)$ {
            auth_request /_auth;
            proxy_pass http://minio/images/$image_name;
        }

        # =================================================================
        # Единая обработка ошибки авторизации.
        # auth_request при неудаче транслирует код ответа security (401/403)
        # на основной запрос; error_page перехватывает его и отдаёт клиенту
        # аккуратный JSON вместо стандартной html-страницы NGINX.
        # =================================================================
        error_page 401 403 = @unauthorized;
        location @unauthorized {
            return 401 '{"error": "unauthorized"}';
        }
    }
}
